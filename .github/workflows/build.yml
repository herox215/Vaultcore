name: Build smoke

on:
  pull_request:
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build.yml'
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: cargo test (lib)
        working-directory: src-tauri
        run: cargo test --lib

  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: tauri android build --debug
        run: pnpm tauri android build --debug

      - name: Assert APK exists and inspect
        run: |
          set -euo pipefail
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*-debug.apk' | head -1)
          if [ -z "$apk" ]; then
            echo "::error::No debug APK found under src-tauri/gen/android/app/build/outputs/apk"
            exit 1
          fi
          echo "APK: $apk"
          aapt2=$(find "$ANDROID_HOME/build-tools" -name aapt2 | sort -r | head -1)
          "$aapt2" dump badging "$apk" | grep -E "^package: name='com\.vaultcore\.app'" \
            || { echo "::error::APK package name mismatch"; exit 1; }
          "$aapt2" dump permissions "$apk"
